---
name: build
"on": push
jobs:
  build:
    name: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v1
        with:
          python-version: ${{ matrix.python }}
      - name: checkout
        run: git fetch --prune --unshallow
      - name: install environment
        run: pip install tox
      - name: run tests
        run: tox -e py
